services:
  frontend:
    build:
      context: ./shoplify-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./shoplify-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=http://localhost:5000/api

  backend:
    build:
      context: ./shoplify-backend
    ports:
      - "5000:5000"
    volumes:
      - ./shoplify-backend:/app
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__shoplify-be=Host=host.docker.internal;Database=shoplify-db;Port=5632;Username=postgres;Password=root
